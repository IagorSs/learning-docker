services:
  manager:
    image: docker:dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    command: ["--tls=false"]
    ports:
      - "8083:8080"

  worker-1:
    image: docker:dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    command: ["--tls=false"]
    ports:
      - "8082:8080"

  worker-2:
    image: docker:dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    command: ["--tls=false"]
    ports:
      - "8081:8080"
